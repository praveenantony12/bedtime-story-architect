services:
  - type: web
    name: bedtime-story-architect
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: >
      streamlit run app.py
      --server.port $PORT
      --server.address 0.0.0.0
      --server.headless true
      --server.enableCORS false
      --server.enableXsrfProtection false
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.0"
      - key: GROQ_API_KEY
        sync: false          # set this in the Render dashboard
      - key: HF_TOKEN
        sync: false          # optional — only needed for AI images via HuggingFace
